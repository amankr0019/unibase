    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {

    /* ─── LOADER ─── */
    #loader {

      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;

    #loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: #111;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .loader-text::after {
      content: '';
      position: absolute;
      top: 0; left: -70%; width: 55%; height: 100%;
      background: linear-gradient(90deg,
        transparent 0%, rgba(70,120,255,.5) 35%,
        rgba(180,210,255,.95) 50%, rgba(70,120,255,.5) 65%, transparent 100%);
      animation: shimmer 1.4s cubic-bezier(0.4,0,0.2,1) 0.4s 1 forwards;
    }
    @keyframes shimmer { 0% { left: -70%; } 100% { left: 125%; } }

    /* ─── PAGE ─── */
    #page {
      opacity: 0;
      transition: opacity 0.9s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #page.show { opacity: 1; }

    /* ─── HERO ─── */
    .hero-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 58% at 50% 42%,
          rgba(25,45,210,.78) 0%,
          rgba(10,18,90,.4) 48%,
          transparent 70%),
        #000;
      z-index: 0;
    }

    nav {

    .wm {

      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);

    .centre {

      flex: 1;

      align-items: center; justify-content: center;
      text-align: center;
      padding: 0 clamp(1rem,5vw,3rem);

      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: clamp(0px, 0.5vw, 6px);
    }
    .halo {
      position: absolute;
      width: clamp(200px,35vw,360px);
      height: clamp(200px,35vw,360px);
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(55,95,255,.68) 0%, rgba(28,55,200,.3) 42%, transparent 68%);
      filter: blur(28px);

    @keyframes pulse { 0% { transform:scale(1); opacity:.78; } 100% { transform:scale(1.13); opacity:1; } }

    .logo {
      position: relative;
      width: clamp(150px,26vw,280px);
      height: auto;
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 18px rgba(85,135,255,.95))
        drop-shadow(0 0 50px rgba(50,90,255,.6))
        drop-shadow(0 0 100px rgba(30,65,255,.3));
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-13px); } }

    h1 {
      font-weight: 300;
      font-size: clamp(2.2rem, 6.5vw, 4.8rem);
      line-height: 1.12;
      color: #fff;
      margin-bottom: clamp(.45rem,1vw,.8rem);

    p.sub {
      font-weight: 300;
      font-size: clamp(.82rem,1.8vw,1.05rem);
      color: rgba(255,255,255,.46);
      max-width: 480px;

    }
    .cs {

      letter-spacing: .36em;
      text-transform: uppercase;
      color: rgba(200,218,255,.52);

    @keyframes up { to { opacity:1; transform:translateY(0); } }

    .hero-bottom { position: relative; z-index: 10; height: clamp(1.2rem,3vw,2.5rem); }

    footer {
